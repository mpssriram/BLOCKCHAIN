services:
  - type: web
    name: paystream-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: ENABLE_DEMO_SEED
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: paystream-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: HELA_RPC_URL
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false
      - key: TAX_VAULT_ADDRESS
        sync: false
      - key: TAX_RATE
        value: 10

databases:
  - name: paystream-db
    plan: free
